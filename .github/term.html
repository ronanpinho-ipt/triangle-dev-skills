<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:900px;height:620px;overflow:hidden;background:#05080e}
  body{display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  body::before{content:"";position:absolute;inset:-20%;
    background:radial-gradient(40% 50% at 20% 15%,rgba(46,230,214,.10),transparent 60%),
               radial-gradient(45% 55% at 85% 90%,rgba(139,124,246,.12),transparent 60%);filter:blur(12px)}
  .term{position:relative;width:820px;height:560px;background:rgba(13,18,28,.94);
    border:1px solid rgba(255,255,255,.10);border-radius:14px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55);backdrop-filter:blur(8px)}
  .bar{height:40px;display:flex;align-items:center;gap:8px;padding:0 16px;
    border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025)}
  .d{width:12px;height:12px;border-radius:50%}
  .r{background:#ff5f57}.y{background:#febc2e}.g{background:#28c840}
  .ttl{margin-left:10px;font-size:12.5px;color:#6b7686;font-family:ui-monospace,Menlo,monospace}
  .body{padding:20px 24px;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:14.5px;line-height:1.62}
  .ln{white-space:pre;color:#cfd8e6}
  .cmd{color:#e9eef7}.prompt{color:#2ee6d6;font-weight:700}
  .ok{color:#34d399}.act{color:#2ee6d6;font-weight:700}.mut{color:#6b7686}
  .cy{color:#2ee6d6}.vi{color:#8b7cf6}.am{color:#fbbf24}.wt{color:#fff;font-weight:700}
  .box{color:#5f6b7e}
  .cur{display:inline-block;width:9px;height:17px;background:#2ee6d6;vertical-align:-3px;
    box-shadow:0 0 8px #2ee6d6;animation:bl 1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}
</style></head><body>
  <div class="term">
    <div class="bar"><span class="d r"></span><span class="d y"></span><span class="d g"></span>
      <span class="ttl">claude — triangle-dev-skills</span></div>
    <div class="body" id="out"></div>
  </div>
<script>
  // cumulative reveal model: frame f shows command (f>=2) then OUT[0..f-3]
  const OUT = [
    '',
    '<span class="act">● impact-report-builder</span> activated',
    '  <span class="mut">Step 1 · Intake</span> ......... 6 metrics found <span class="ok">✓</span>',
    '  <span class="mut">Step 2 · Normalize</span> ...... GRI / SASB / SDOH <span class="ok">✓</span>',
    '  <span class="mut">Step 3 · Verify</span> ......... 6/6 source-traced · <span class="am">1 gap</span>',
    '  <span class="mut">Step 4 · Draft</span> .......... partner briefing',
    '  <span class="mut">Step 5 · Output</span> ......... briefing + appendix + gaps <span class="ok">✓</span>',
    '',
    '<span class="box">┌─ DATA APPENDIX · audit-ready ───────────────┐</span>',
    '<span class="box">│</span> members served  <span class="wt">1,240</span>  <span class="vi">GRI 413</span>  <span class="cy">R1</span> <span class="ok">✓</span> <span class="box">│</span>',
    '<span class="box">│</span> meals (redine_) <span class="wt">5,600</span>  <span class="vi">GRI 413</span>  <span class="cy">R3</span> <span class="ok">✓</span> <span class="box">│</span>',
    '<span class="box">│</span> jobs supported     <span class="wt">38</span>  <span class="vi">GRI 203</span>  <span class="cy">R2</span> <span class="ok">✓</span> <span class="box">│</span>',
    '<span class="box">└──────────────────────────────────────────────┘</span>',
    '',
    '<span class="am">▲ DATA GAPS</span>',
    '  <span class="am">&lt;VERIFY: program name behind redine_meals&gt;</span>',
    '  <span class="am">&lt;VERIFY: Q1-2026 baselines for trend&gt;</span>',
    '',
    '<span class="wt">✓ 6 raw numbers → board-grade, source-traced briefing.</span>',
    '  <span class="mut">Zero fabrication. Every figure cited or flagged.</span>',
  ];
  const f = parseInt(new URLSearchParams(location.search).get('f')||'1',10);
  const last = OUT.length + 2;            // total frames
  const lines = [];
  // command line
  if (f === 1) lines.push('<span class="prompt">❯</span> <span class="cur"></span>');
  else lines.push('<span class="prompt">❯</span> <span class="cmd">/impact-report-builder Q2-2026</span>' + (f===2?'<span class="cur"></span>':''));
  // output lines
  if (f >= 3){
    const n = Math.min(f-2, OUT.length);
    for (let i=0;i<n;i++){
      let html = OUT[i];
      if (i===n-1 && f<last && OUT[i]!=='') html += '<span class="cur"></span>';
      lines.push(html===''?'&nbsp;':html);
    }
  }
  document.getElementById('out').innerHTML = lines.map(l=>'<div class="ln">'+l+'</div>').join('');
</script>
</body></html>
